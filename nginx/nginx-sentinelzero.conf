# Nginx configuration for SentinelZero with Authentik Forward Auth
# Place this in /etc/nginx/sites-available/sentinelzero
# Then symlink: sudo ln -s /etc/nginx/sites-available/sentinelzero /etc/nginx/sites-enabled/

# Upstream backend (systemd service running on port 5000)
upstream sentinelzero_backend {
    server 127.0.0.1:5000;
    keepalive 32;
}

# Upstream Authentik - using external host (accessible from nginx on host)
# Internal Docker hostname 'authentik:9000' not accessible from host nginx
upstream authentik {
    server auth.ops.prox:443;  # External host (HTTPS)
    keepalive 32;
}

# HTTP server - redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name sentinelzero.ops.prox;  # Update with your domain

    # Redirect all HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sentinelzero.ops.prox;  # Update with your domain

    # SSL configuration - using self-signed certificate for internal domain
    # For internal .prox domain, Let's Encrypt won't work (not a public TLD)
    ssl_certificate /etc/nginx/ssl/sentinelzero.ops.prox.crt;
    ssl_certificate_key /etc/nginx/ssl/sentinelzero.ops.prox.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Logging
    access_log /var/log/nginx/sentinelzero-access.log;
    error_log /var/log/nginx/sentinelzero-error.log;

    # Authentik forward auth - check authentication before proxying
    # Using Proxy mode (not OAuth) - endpoint for Traefik/nginx forward auth
    location = /auth {
        internal;
        proxy_pass https://auth.ops.prox/outpost.goauthentik.io/auth/traefik;
        proxy_ssl_verify off;  # Set to 'on' if you have valid SSL certs
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URL $scheme://$http_host$request_uri;
        proxy_set_header X-Original-Method $request_method;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-URI $request_uri;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Scheme $scheme;
    }

    # Main application - protected by Authentik
    location / {
        # Authenticate request
        auth_request /auth;
        auth_request_set $user $upstream_http_x_authentik_username;
        auth_request_set $email $upstream_http_x_authentik_email;
        auth_request_set $groups $upstream_http_x_authentik_groups;
        
        # Pass user info to backend (optional, for user-specific features)
        proxy_set_header X-Authentik-User $user;
        proxy_set_header X-Authentik-Email $email;
        proxy_set_header X-Authentik-Groups $groups;

        # Proxy to backend
        proxy_pass http://sentinelzero_backend;
        proxy_http_version 1.1;
        
        # WebSocket support for Socket.IO
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        
        # Timeouts for long-running requests (scans)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer settings
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Socket.IO WebSocket endpoint
    location /socket.io/ {
        # Authenticate request
        auth_request /auth;
        
        # Proxy to backend with WebSocket support
        proxy_pass http://sentinelzero_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket timeouts
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    # API endpoints (also protected)
    location /api/ {
        auth_request /auth;
        proxy_pass http://sentinelzero_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

