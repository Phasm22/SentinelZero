# Temporary nginx config WITHOUT Authentik auth for testing
# Use this to verify backend connectivity, then switch back to full config

# Upstream backend (systemd service running on port 5000)
upstream sentinelzero_backend {
    server 127.0.0.1:5000;
    keepalive 32;
}

# HTTP server - redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name sentinelzero.prox;

    # Redirect all HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS server - NO AUTH (for testing)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sentinelzero.prox;

    # SSL configuration
    ssl_certificate /etc/nginx/ssl/sentinelzero.prox.crt;
    ssl_certificate_key /etc/nginx/ssl/sentinelzero.prox.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Logging
    access_log /var/log/nginx/sentinelzero-access.log;
    error_log /var/log/nginx/sentinelzero-error.log;

    # Main application - NO AUTH (temporary for testing)
    location / {
        # Proxy to backend
        proxy_pass http://sentinelzero_backend;
        proxy_http_version 1.1;
        
        # WebSocket support for Socket.IO
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        
        # Timeouts for long-running requests (scans)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer settings
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Socket.IO WebSocket endpoint
    location /socket.io/ {
        # Proxy to backend with WebSocket support
        proxy_pass http://sentinelzero_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket timeouts
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    # API endpoints
    location /api/ {
        proxy_pass http://sentinelzero_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

