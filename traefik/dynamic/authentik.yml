# Authentik Forward Auth Middleware Configuration
# This file configures Traefik to use Authentik for authentication
# Update the URLs to match your Authentik server

http:
  middlewares:
    # Authentik forward auth middleware
    auth:
      forwardAuth:
        address: "https://auth.ops.prox/outpost.goauthentik.io/auth/traefik"
        authResponseHeaders:
          - "X-authentik-username"
          - "X-authentik-groups"
          - "X-authentik-email"
          - "X-authentik-name"
          - "X-authentik-uid"
        authResponseHeadersRegex: "^X-authentik-.*"
        trustForwardHeader: true
    
    # Redirect HTTP to HTTPS
    redirect-to-https:
      redirectScheme:
        scheme: https
        permanent: true
    
    # WebSocket headers for Socket.IO
    websocket-headers:
      headers:
        customRequestHeaders:
          X-Forwarded-Proto: "https"

