# Traefik File Provider Configuration for SentinelZero
# Routes sentinelzero.ops.prox to the Flask production app on port 5000
# (serves built React dist + /api + /socket.io). Copy to Traefik's dynamic dir.

http:
  routers:
    # HTTP router - redirect to HTTPS
    sentinelzero-http:
      rule: "Host(`sentinelzero.ops.prox`)"
      entryPoints:
        - web
      middlewares:
        - redirect-to-https
      service: sentinelzero-app

    # HTTPS router with Authentik middleware
    sentinelzero:
      rule: "Host(`sentinelzero.ops.prox`)"
      entryPoints:
        - websecure
      middlewares:
        - auth@file  # Authentik forward auth
        - websocket-headers@file
      service: sentinelzero-app
      tls:
        certResolver: letsencrypt

  services:
    # Production app: Flask serves frontend/react-sentinelzero/dist statically
    sentinelzero-app:
      loadBalancer:
        servers:
          - url: "http://172.16.0.198:5000"
        passHostHeader: true
