id: home_inventory
objective: >
  Enumerate home network hosts using the hunter dual-homed interface. Prioritize Pi-hole
  clients and passive telemetry unknowns vs assets. Gather evidence and submit findings;
  do not assign verdict labels.
target_network: 192.168.68.0/22
profile: white
executor: local
iface: enp6s19
max_turns: 40
parallel_workers: 1
handoff:
  trigger_discovery_scan: true
  scan_type: "Discovery Scan"
  min_new_hosts: 1
  max_recommended_hosts: 10
scope:
  allowed_cidrs:
    - 192.168.68.0/22
    - 192.168.71.0/24

